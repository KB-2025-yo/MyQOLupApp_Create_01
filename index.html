<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホで正しく表示するための設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品スキャンリスト</title>

  <!-- バーコードスキャンライブラリ（html5-qrcode）をCDN経由で読み込む -->
  <!-- CDN = インターネット上のサーバーから直接読み込む仕組み。インストール不要。 -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    /* =====================
       全体のリセット・基本設定
       ===================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* スマホ向けフォント指定 */
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                   "游ゴシック体", YuGothic, sans-serif;
      background: #f0f0f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* =====================
       ヘッダー（上のバー）
       ===================== */
    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* =====================
       メインコンテンツの幅制限（PC・スマホ両対応）
       ===================== */
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* =====================
       カード（白い四角のボックス）
       ===================== */
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      /* 軽い影でカードっぽく見せる */
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* =====================
       ラベルと入力欄
       ===================== */
    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
      margin-top: 12px;
    }

    /* 最初のラベルは上マージン不要 */
    label:first-of-type {
      margin-top: 0;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 16px; /* スマホで自動ズームを防ぐには16px以上が必要 */
      border: 1.5px solid #ddd;
      border-radius: 9px;
      outline: none;
      transition: border-color 0.2s;
      /* 入力欄のフォントをbodyと合わせる */
      font-family: inherit;
      color: #1a1a2e;
    }

    /* フォーカス時（選択されたとき）の枠の色 */
    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: #4361ee;
    }

    /* =====================
       エラーメッセージ（最初は非表示）
       ===================== */
    .error-msg {
      font-size: 12px;
      color: #e63946;
      margin-top: 5px;
      /* display: none → display: block に切り替えて表示/非表示を制御する */
      display: none;
    }

    /* =====================
       ボタン（共通スタイル）
       ===================== */
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active {
      transform: scale(0.98);
    }

    /* 追加ボタン */
    .btn-add {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 13px;
      font-size: 15px;
      background: #4361ee;
      color: white;
      border-radius: 10px;
    }

    .btn-add:hover {
      opacity: 0.88;
    }

    /* CSV書き出しボタン */
    .btn-export {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      font-size: 14px;
      background: #2ec4b6;
      color: white;
      border-radius: 10px;
    }

    .btn-export:hover {
      opacity: 0.88;
    }

    /* 全件削除ボタン */
    .btn-clear {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      font-size: 13px;
      background: none;
      color: #e63946;
      border: 1.5px solid #e63946;
      border-radius: 10px;
    }

    .btn-clear:hover {
      background: #fff0f0;
    }

    /* =====================
       件数ラベル
       ===================== */
    .item-count {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    /* =====================
       商品リスト
       ===================== */
    .item-list {
      /* アイテムが多くても縦スクロールできる */
      max-height: 420px;
      overflow-y: auto;
    }

    /* 1件ずつの行 */
    .item-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 10px;
    }

    .item-row:last-child {
      border-bottom: none;
    }

    /* 連番（#1, #2...） */
    .item-index {
      font-size: 11px;
      color: #bbb;
      min-width: 22px;
      text-align: right;
    }

    /* バーコード番号 */
    .item-barcode {
      flex: 1; /* 残りの幅を全部使う */
      font-size: 14px;
      font-family: "Courier New", monospace; /* コードっぽいフォント */
      color: #1a1a2e;
      word-break: break-all; /* 長い番号でも折り返す */
    }

    /* 個数バッジ */
    .item-qty {
      font-size: 12px;
      font-weight: 600;
      background: #f0f2ff;
      color: #4361ee;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* 削除ボタン（✕マーク） */
    .btn-delete {
      background: none;
      color: #ccc;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 6px;
    }

    .btn-delete:hover {
      color: #e63946;
      background: #fff0f0;
    }

    /* =====================
       「まだ何もない」状態の表示
       ===================== */
    .empty-state {
      text-align: center;
      padding: 30px 0;
      color: #bbb;
      font-size: 14px;
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    /* =====================
       操作ボタンエリア（最初は非表示）
       ===================== */
    #action-area {
      display: none; /* JavaScriptで表示切り替え */
    }
    /* =====================
       カメラボタン
       ===================== */
    .btn-camera {
      display: block;
      width: 100%;
      padding: 13px;
      font-size: 15px;
      background: #1a1a2e;
      color: white;
      border-radius: 10px;
      font-family: inherit;
      margin-bottom: 14px;
    }

    .btn-camera:hover {
      opacity: 0.85;
    }

    /* 「または」区切り線 */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bbb;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }

    /* =====================
       カメラオーバーレイ（全画面）
       ===================== */

    /* 全画面を覆う暗い背景 */
    #camera-overlay {
      display: none; /* 最初は非表示。openCamera()でflexに変わる */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.93);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    #camera-overlay .overlay-title {
      color: white;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 18px;
      text-align: center;
    }

    /* html5-qrcodeがここにカメラ映像を生成する */
    #reader {
      width: 100%;
      max-width: 320px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    /* ライブラリが内部生成するvideoタグの角丸 */
    #reader video {
      border-radius: 12px;
    }

    /* 補足テキスト */
    #camera-overlay .overlay-hint {
      color: rgba(255, 255, 255, 0.55);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    /* 「読み取りました！」などのステータス表示 */
    #camera-status {
      color: white;
      font-size: 14px;
      margin-top: 12px;
      min-height: 22px;
      text-align: center;
      white-space: pre-line; /* \n で改行できるように */
    }

    /* キャンセルボタン */
    .btn-cancel-camera {
      margin-top: 22px;
      padding: 12px 36px;
      background: none;
      color: white;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-cancel-camera:hover {
      background: rgba(255, 255, 255, 0.1);
    }

  </style>
</head>

<body>

  <!-- ヘッダー -->
  <header>
    <span style="font-size:22px;">📦</span>
    <h1>商品スキャンリスト</h1>
  </header>

  <main>

    <!-- ===== 入力カード ===== -->
    <div class="card">
      <div class="card-title">商品を追加</div>

      <!-- カメラボタン（メインの入力方法） -->
      <button class="btn-camera" onclick="openCamera()">📷 カメラでバーコードを読み取る</button>

      <!-- 区切り -->
      <div class="or-divider">または手入力</div>

      <label for="barcode-input">バーコード番号（JANコードなど）</label>
      <input
        type="text"
        id="barcode-input"
        placeholder="例：4988001234567"
        inputmode="numeric"
        autocomplete="off"
      >
      <!-- バリデーションエラーが出たときだけ表示 -->
      <div class="error-msg" id="error-barcode">バーコード番号を入力してください</div>

      <label for="qty-input">個数</label>
      <input
        type="number"
        id="qty-input"
        value="1"
        min="1"
        max="999"
      >

      <button class="btn-add" onclick="addItem()">＋ リストに追加する</button>
    </div>

    <!-- ===== リスト表示カード ===== -->
    <div class="card">
      <div class="card-title">登録リスト</div>

      <div class="item-count" id="item-count">0件</div>

      <!-- 商品リスト（JavaScriptで動的に中身を書き換える） -->
      <div class="item-list" id="item-list">
        <!-- 最初は「空」の状態を表示 -->
        <div class="empty-state" id="empty-state">
          <div class="icon">🗂️</div>
          <div>バーコードを入力して追加しましょう</div>
        </div>
      </div>

      <!-- アイテムが1件以上あるときだけ表示するボタンエリア -->
      <div id="action-area">
        <button class="btn-export" onclick="exportCSV()">📥 CSVで書き出す</button>
        <button class="btn-clear" onclick="clearAll()">すべて削除する</button>
      </div>
    </div>

  </main>

  <!-- ===== カメラオーバーレイ（全画面・最初は非表示） ===== -->
  <div id="camera-overlay">
    <div class="overlay-title">📷 バーコードをかざしてください</div>

    <!-- html5-qrcodeライブラリがここにカメラ映像を描画する -->
    <div id="reader"></div>

    <div class="overlay-hint">バーコードを枠の中に合わせてください</div>
    <div id="camera-status"></div>

    <button class="btn-cancel-camera" onclick="closeCamera()">キャンセル</button>
  </div>

  <!-- ===================================================
       JavaScript（このページの「動き」を担当する部分）
       =================================================== -->
  <script>

    // -----------------------------------------------
    // カメラ関連
    // html5QrCode インスタンスを保持する変数（nullのときはカメラ停止中）
    // -----------------------------------------------
    let html5QrCode = null;

    // -----------------------------------------------
    // カメラを起動する処理
    // -----------------------------------------------
    function openCamera() {
      // オーバーレイを表示（display: flex にして中央揃えを有効にする）
      document.getElementById('camera-overlay').style.display = 'flex';
      document.getElementById('camera-status').textContent = 'カメラを起動中...';

      // html5-qrcodeのインスタンスを作成
      // "reader" = カメラ映像を表示するdivのid
      html5QrCode = new Html5Qrcode("reader");

      // スキャン設定
      const scanConfig = {
        fps: 10,                      // 1秒間に10回スキャンを試みる
        qrbox: { width: 240, height: 100 }, // スキャン枠のサイズ（バーコードは横長）
        aspectRatio: 1.3333,          // カメラ映像の縦横比（4:3）
      };

      html5QrCode.start(
        { facingMode: "environment" }, // "environment" = 背面カメラ（バーコードを写す側）
        scanConfig,

        // ★ バーコードを読み取れたときに呼ばれる関数
        function(decodedText) {
          // 読み取った番号をバーコード入力欄にセット
          document.getElementById('barcode-input').value = decodedText;
          document.getElementById('error-barcode').style.display = 'none';
          document.getElementById('camera-status').textContent = '✅ 読み取りました！';

          // 0.7秒後にカメラを閉じて個数入力欄にカーソルを移す
          setTimeout(function() {
            closeCamera();
            document.getElementById('qty-input').focus();
            document.getElementById('qty-input').select();
          }, 700);
        },

        // スキャン試行ごとに呼ばれるエラーコールバック
        // 読み取れなかっただけなので毎フレーム呼ばれる → 無視でOK
        function(errorMessage) { /* 何もしない */ }

      ).then(function() {
        // 起動成功
        document.getElementById('camera-status').textContent = 'バーコードを探しています...';

      }).catch(function(err) {
        // カメラの起動に失敗（権限拒否・ハードウェアエラーなど）
        document.getElementById('camera-status').textContent =
          '⚠️ カメラを起動できませんでした。\nSafariの設定でカメラを許可してください。';
        console.error('カメラエラー:', err);
      });
    }

    // -----------------------------------------------
    // カメラを閉じる処理
    // -----------------------------------------------
    function closeCamera() {
      if (html5QrCode) {
        // stop() は非同期処理（Promiseを返す）なので、
        // .then() の中でオーバーレイを非表示にする
        html5QrCode.stop().then(function() {
          html5QrCode = null;
          document.getElementById('camera-overlay').style.display = 'none';
          document.getElementById('camera-status').textContent = '';
        }).catch(function() {
          // エラーが出ても強制的に閉じる
          html5QrCode = null;
          document.getElementById('camera-overlay').style.display = 'none';
        });
      } else {
        document.getElementById('camera-overlay').style.display = 'none';
      }
    }

    // -----------------------------------------------
    // データの保管場所（配列）
    // items は { barcode, qty, addedAt } の形のオブジェクトの集まり
    // -----------------------------------------------
    let items = [];

    // -----------------------------------------------
    // 「リストに追加する」ボタンが押されたときの処理
    // -----------------------------------------------
    function addItem() {
      // 入力欄から値を取り出す
      const barcodeInput = document.getElementById('barcode-input');
      const qtyInput     = document.getElementById('qty-input');
      const errorEl      = document.getElementById('error-barcode');

      const barcode = barcodeInput.value.trim(); // 前後の空白を除去
      const qty     = Math.max(1, parseInt(qtyInput.value) || 1); // 最低1個

      // バーコードが空だったらエラーを表示して処理を中断
      if (!barcode) {
        errorEl.style.display = 'block';
        barcodeInput.focus();
        return;
      }

      // エラーを消す
      errorEl.style.display = 'none';

      // 配列に新しいアイテムを追加
      items.push({
        barcode: barcode,
        qty:     qty,
        addedAt: new Date().toLocaleString('ja-JP') // 追加した日時
      });

      // 入力欄をリセット（次の商品をすぐ入力できるように）
      barcodeInput.value = '';
      qtyInput.value     = '1';
      barcodeInput.focus(); // カーソルをバーコード欄に戻す

      // 画面を更新する
      renderList();
    }

    // -----------------------------------------------
    // リスト全体を画面に描画（再描画）する処理
    // -----------------------------------------------
    function renderList() {
      const listEl      = document.getElementById('item-list');
      const emptyEl     = document.getElementById('empty-state');
      const countEl     = document.getElementById('item-count');
      const actionArea  = document.getElementById('action-area');

      // 件数を更新
      countEl.textContent = `${items.length}件`;

      // アイテムが0件のときは「空」メッセージを表示してボタンを隠す
      if (items.length === 0) {
        emptyEl.style.display = 'block'; // 空メッセージを表示
        actionArea.style.display = 'none'; // ボタンを隠す

        // リストの中身（アイテム行）だけ消す（空メッセージは残す）
        const existingRows = listEl.querySelectorAll('.item-row');
        existingRows.forEach(row => row.remove());
        return;
      }

      // アイテムが1件以上なら空メッセージを隠してボタンを表示
      emptyEl.style.display = 'none';
      actionArea.style.display = 'block';

      // リスト全体を作り直す
      // まず既存の行をすべて削除
      const existingRows = listEl.querySelectorAll('.item-row');
      existingRows.forEach(row => row.remove());

      // 各アイテムの行を新しく作ってリストに追加
      // ※ 新しいアイテムが上に来るように逆順で表示
      const reversed = [...items].reverse();

      reversed.forEach((item, reversedIndex) => {
        // 元の配列でのインデックスを計算（削除ボタンで使う）
        const originalIndex = items.length - 1 - reversedIndex;

        // 新しい <div class="item-row"> を作る
        const row = document.createElement('div');
        row.className = 'item-row';

        // 行の中身をHTMLで定義
        row.innerHTML = `
          <span class="item-index">#${originalIndex + 1}</span>
          <span class="item-barcode">${escapeHtml(item.barcode)}</span>
          <span class="item-qty">×${item.qty}</span>
          <button class="btn-delete" onclick="deleteItem(${originalIndex})" title="削除">✕</button>
        `;

        // listEl の末尾に追加（emptyStateより後ろに入る）
        listEl.appendChild(row);
      });
    }

    // -----------------------------------------------
    // 指定インデックスのアイテムを削除する処理
    // -----------------------------------------------
    function deleteItem(index) {
      // splice(開始位置, 削除する件数)
      items.splice(index, 1);
      renderList();
    }

    // -----------------------------------------------
    // 全件削除
    // -----------------------------------------------
    function clearAll() {
      if (!confirm(`${items.length}件すべて削除しますか？`)) return;
      items = [];
      renderList();
    }

    // -----------------------------------------------
    // CSVファイルに書き出す処理
    // -----------------------------------------------
    function exportCSV() {
      if (items.length === 0) return;

      // ヘッダー行
      const header = 'No.,バーコード,個数,追加日時';

      // データ行（各アイテムを1行ずつ）
      const rows = items.map((item, index) => {
        // ★ポイント: Excelにバーコードを「テキスト」として扱わせる書き方
        //
        // 普通に数字を書くと → 5941370000000 → Excelが数値と判断 → 5.94137E+12（指数表記）に変換してしまう
        // ="5941370000000" という形式で書くと → ExcelはこれをTEXT関数扱いにして数値変換をしない
        //
        // CSVのルール上、セル内にダブルクォート(")を含む場合は
        // ・フィールド全体をダブルクォートで囲む → "..."
        // ・内側の " はふたつ重ねてエスケープする → ""
        //
        // 結果として、Excelに渡したい  ="5941370000000"  は
        // CSVの文字列として  "=""5941370000000"""  と書く必要がある
        const barcodeCell = `"=""${item.barcode}"""`;
        return `${index + 1},${barcodeCell},${item.qty},"${item.addedAt}"`;
      });

      // ヘッダー + データ行を改行でつなぐ
      const csvContent = [header, ...rows].join('\n');

      // '\uFEFF' = BOM（ExcelやGoogleスプレッドシートで文字化けを防ぐ）
      const blob = new Blob(['\uFEFF' + csvContent], {
        type: 'text/csv;charset=utf-8;'
      });

      // ダウンロード用の一時URLを作ってクリックをシミュレート
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10); // "2025-01-15" 形式
      link.href     = url;
      link.download = `商品リスト_${today}.csv`;
      link.click();

      // 使い終わったURLを解放（メモリ節約）
      URL.revokeObjectURL(url);
    }

    // -----------------------------------------------
    // XSS対策：HTML特殊文字をエスケープする関数
    // ユーザーが入力した文字を画面に表示するときは必ずこれを通す
    // -----------------------------------------------
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // -----------------------------------------------
    // Enterキーでも「追加」できるようにする
    // -----------------------------------------------
    document.getElementById('barcode-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault(); // フォームのデフォルト送信を止める
        addItem();
      }
    });

    document.getElementById('qty-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addItem();
      }
    });

  </script>

</body>
</html>
